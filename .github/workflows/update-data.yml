name: 自动更新活动数据

on:
  schedule:
    - cron: '0 0 */2 * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Run scrapers
        run: |
          cd scripts
          python main.py

      - name: Purge auto_generated (数据真实性纵深防御)
        run: python3 scripts/purge_auto_generated.py

      - name: Enrich districts (写入 district 字段)
        run: python3 scripts/enrich_districts.py

      - name: Add booking_method (报名入口，避免重抓后丢失)
        run: python3 scripts/add_booking_method.py

      - name: Verify activities against official sources (官方核实，替代人工核实)
        run: python3 scripts/verify_activities.py

      - name: Sync mini-program fallback data
        run: python3 scripts/sync_miniprogram_data.py

      - name: Generate per-city ICS subscription files
        run: python3 scripts/generate_city_ics.py

      - name: Generate per-city venue files (小程序场馆指南分城市并行加载)
        run: python3 scripts/generate_city_venues.py

      - name: Generate tiered activity snapshots (小程序三级优先加载)
        run: python3 scripts/generate_tiered.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate cities manifest (网页/小程序统一城市清单)
        run: node scripts/generate_cities_manifest.js

      - name: Commit and push
        run: |
          git config --global user.name "Auto Update Bot"
          git config --global user.email "bot@example.com"
          git add output/ 2>/dev/null || true
          git add miniprogram/data/exhibitions.js miniprogram/data/venues.js 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: 自动更新活动数据 & 同步小程序 $(date '+%Y-%m-%d')"
            git push
          fi
