name: 自动更新活动数据

on:
  schedule:
    - cron: '0 0 */2 * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Run scrapers
        run: |
          cd scripts
          python main.py

      - name: Enrich districts (写入 district 字段)
        run: python3 scripts/enrich_districts.py

      - name: Sync mini-program fallback data
        run: python3 scripts/sync_miniprogram_data.py

      - name: Commit and push
        run: |
          git config --global user.name "Auto Update Bot"
          git config --global user.email "bot@example.com"
          git add output/exhibitions.json output/exhibitions.ics output/exhibitions.rss 2>/dev/null || true
          git add miniprogram/data/exhibitions.js miniprogram/data/venues.js 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: 自动更新活动数据 & 同步小程序 $(date '+%Y-%m-%d')"
            git push
          fi
