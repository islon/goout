<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="public, max-age=86400">
    <title>童行 - 深圳亲子活动日程</title>
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
    <link rel="icon" type="image/png" sizes="48x48" href="favicon-48.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <style>
        :root {
            --primary: #0066cc;
            --primary-focus: #0071e3;
            --primary-on-dark: #2997ff;
            --ink: #1d1d1f;
            --body: #1d1d1f;
            --body-on-dark: #ffffff;
            --body-muted: #cccccc;
            --ink-muted-80: #333333;
            --ink-muted-48: #7a7a7a;
            --divider-soft: #f0f0f0;
            --hairline: #e0e0e0;
            --canvas: #ffffff;
            --canvas-parchment: #f5f5f7;
            --surface-pearl: #fafafc;
            --surface-tile-1: #272729;
            --surface-tile-2: #2a2a2c;
            --surface-tile-3: #252527;
            --surface-black: #000000;
            --surface-chip-translucent: #d2d2d7;
            --on-primary: #ffffff;
            --on-dark: #ffffff;
            --radius-xs: 5px;
            --radius-sm: 8px;
            --radius-md: 11px;
            --radius-lg: 18px;
            --radius-pill: 9999px;
            --radius-full: 9999px;
            --spacing-xxs: 4px;
            --spacing-xs: 8px;
            --spacing-sm: 12px;
            --spacing-md: 17px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
            --spacing-xxl: 48px;
            --spacing-section: 80px;
            --product-shadow: rgba(0, 0, 0, 0.22) 3px 5px 30px 0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--canvas-parchment);
            min-height: 100vh;
            color: var(--body);
            font-size: 17px;
            line-height: 1.47;
            letter-spacing: -0.374px;
            -webkit-font-smoothing: antialiased;
        }

        .global-nav {
            background: var(--surface-black);
            color: var(--on-dark);
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 var(--spacing-lg);
            font-size: 12px;
            letter-spacing: -0.12px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .global-nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .global-nav-link {
            color: var(--on-dark);
            text-decoration: none;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        .global-nav-link:hover {
            opacity: 1;
        }

        .global-nav-logo {
            font-size: 16px;
            font-weight: 600;
        }

        .hero-tile {
            background: var(--surface-tile-1);
            color: var(--on-dark);
            padding: var(--spacing-section) var(--spacing-lg);
            text-align: center;
        }

        .hero-title {
            font-size: 34px;
            font-weight: 600;
            line-height: 1.07;
            letter-spacing: -0.28px;
            margin-bottom: var(--spacing-sm);
        }

        .hero-subtitle {
            font-size: 21px;
            font-weight: 400;
            line-height: 1.19;
            letter-spacing: 0.231px;
            opacity: 0.9;
            margin-bottom: var(--spacing-xl);
        }

        .hero-stats {
            font-size: 14px;
            opacity: 0.7;
            margin-top: var(--spacing-sm);
        }

        .hero-note {
            font-size: 12px;
            opacity: 0.6;
            margin-top: var(--spacing-xs);
        }

        .main-wrapper {
            display: flex;
            max-width: 1200px;
            margin: 0 auto;
            padding: var(--spacing-lg);
            gap: var(--spacing-xl);
        }

        .sidebar {
            width: 260px;
            flex-shrink: 0;
            display: none;
        }

        .sidebar-card {
            background: var(--canvas);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            margin-bottom: var(--spacing-md);
            border: 1px solid var(--hairline);
        }

        .sidebar-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--ink);
            margin-bottom: var(--spacing-md);
            padding-bottom: var(--spacing-sm);
            border-bottom: 1px solid var(--hairline);
            letter-spacing: -0.224px;
        }

        .filter-section-mobile {
            background: var(--canvas);
            padding: var(--spacing-md) var(--spacing-lg);
            border-bottom: 1px solid var(--hairline);
        }

        .filter-label {
            font-size: 12px;
            color: var(--ink-muted-48);
            margin-bottom: var(--spacing-sm);
            padding-left: var(--spacing-xxs);
            font-weight: 600;
            letter-spacing: -0.12px;
        }

        .filter-bar {
            display: flex;
            gap: var(--spacing-xs);
            overflow-x: auto;
            padding-bottom: var(--spacing-xxs);
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            background: var(--canvas);
            border: 1px solid var(--hairline);
            border-radius: var(--radius-pill);
            font-size: 14px;
            color: var(--ink-muted-48);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.15s;
            flex-shrink: 0;
            font-weight: 400;
        }

        .filter-btn.active {
            background: var(--primary);
            color: var(--on-primary);
            border-color: var(--primary);
        }

        .filter-btn:hover:not(.active) {
            background: var(--surface-pearl);
            color: var(--ink);
            border-color: var(--divider-soft);
        }

        .filter-btn:active {
            transform: scale(0.95);
        }

        .search-container {
            position: relative;
            margin-bottom: var(--spacing-md);
        }

        .search-input {
            width: 100%;
            padding: 12px 40px 12px 16px;
            border: 1px solid var(--hairline);
            border-radius: var(--radius-pill);
            font-size: 17px;
            background: var(--canvas);
            transition: all 0.15s;
            color: var(--body);
            letter-spacing: -0.374px;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--canvas);
        }

        .search-input::placeholder {
            color: var(--ink-muted-48);
        }

        .search-icon {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--ink-muted-48);
            font-size: 16px;
            pointer-events: none;
        }

        .content {
            flex: 1;
            min-width: 0;
        }

        .count-info {
            font-size: 14px;
            color: var(--ink-muted-48);
            margin-bottom: var(--spacing-md);
            text-align: right;
            letter-spacing: -0.224px;
        }

        .exhibition-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: var(--spacing-md);
        }

        .exhibition-card {
            background: var(--canvas);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            border: 1px solid var(--hairline);
            transition: transform 0.15s;
            cursor: pointer;
            position: relative;
            opacity: 0;
        }

        .exhibition-card:hover {
            transform: scale(1.01);
        }

        .exhibition-card:active {
            transform: scale(0.99);
        }

        .exhibition-card.cat-展览 { border-left: 3px solid var(--primary); }
        .exhibition-card.cat-讲座阅读 { border-left: 3px solid #8B5CF6; }
        .exhibition-card.cat-科普活动 { border-left: 3px solid #166534; }
        .exhibition-card.cat-演出 { border-left: 3px solid #CA8A04; }
        .exhibition-card.cat-影视放映 { border-left: 3px solid #DB2777; }
        .exhibition-card.cat-体育赛事 { border-left: 3px solid #DC2626; }
        .exhibition-card.cat-亲子活动 { border-left: 3px solid #0066cc; }
        .exhibition-card.cat-其他 { border-left: 3px solid var(--ink-muted-48); }

        .exhibition-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: var(--spacing-sm);
        }

        .exhibition-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--ink);
            line-height: 1.24;
            flex: 1;
            margin-right: var(--spacing-sm);
            letter-spacing: -0.374px;
        }

        .exhibition-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            flex-shrink: 0;
        }

        .badge {
            padding: 4px 10px;
            border-radius: var(--radius-pill);
            font-size: 11px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            line-height: 1.2;
        }

        .badge.free {
            background: #e8f5e9;
            color: #166534;
            border: 1px solid rgba(22, 101, 52, 0.15);
        }

        .badge.free::before {
            content: '✓';
            font-weight: 700;
        }

        .badge.paid {
            background: #fff3e0;
            color: #CA8A04;
            border: 1px solid rgba(202, 138, 4, 0.15);
        }

        .badge.paid::before {
            content: '💰';
            font-size: 10px;
        }

        .badge.family {
            background: #e3f2fd;
            color: var(--primary);
            border: 1px solid rgba(0, 102, 204, 0.15);
        }

        .badge.family::before {
            content: '👨‍👩‍👧';
            font-size: 10px;
        }

        .badge.type-展览 { background: #e3f2fd; color: var(--primary); border: 1px solid rgba(0, 102, 204, 0.15); }
        .badge.type-讲座阅读 { background: #ede9fe; color: #7c3aed; border: 1px solid rgba(124, 58, 237, 0.15); }
        .badge.type-科普活动 { background: #e8f5e9; color: #166534; border: 1px solid rgba(22, 101, 52, 0.15); }
        .badge.type-演出 { background: #fef3c7; color: #ca8a04; border: 1px solid rgba(202, 138, 4, 0.15); }
        .badge.type-影视放映 { background: #fce7f3; color: #be185d; border: 1px solid rgba(190, 24, 93, 0.15); }
        .badge.type-体育赛事 { background: #fee2e2; color: #dc2626; border: 1px solid rgba(220, 38, 38, 0.15); }
        .badge.type-亲子活动 { background: #e3f2fd; color: var(--primary); border: 1px solid rgba(0, 102, 204, 0.15); }
        .badge.type-其他 { background: #f1f5f9; color: #64748b; border: 1px solid rgba(100, 116, 139, 0.15); }

        .exhibition-meta {
            display: flex;
            flex-wrap: wrap;
            gap: var(--spacing-sm);
            font-size: 14px;
            color: var(--ink-muted-48);
            margin-bottom: var(--spacing-sm);
            margin-top: var(--spacing-xs);
        }

        .exhibition-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .exhibition-desc {
            font-size: 14px;
            color: var(--ink-muted-80);
            line-height: 1.43;
            margin-bottom: var(--spacing-sm);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            letter-spacing: -0.224px;
        }

        .exhibition-desc.expanded {
            display: block;
            -webkit-line-clamp: unset;
            max-height: 200px;
        }

        .expand-link {
            color: var(--primary);
            font-size: 14px;
            cursor: pointer;
            margin-bottom: var(--spacing-sm);
            display: inline-block;
            font-weight: 400;
        }

        .expand-link:hover {
            text-decoration: underline;
        }

        .exhibition-link {
            display: inline-block;
            padding: 6px 14px;
            background: var(--primary);
            color: var(--on-primary);
            border-radius: var(--radius-sm);
            font-size: 14px;
            text-decoration: none;
            font-weight: 400;
            text-align: left;
            transition: transform 0.15s;
        }

        .exhibition-link:hover {
            transform: scale(1.02);
        }

        .exhibition-link:active {
            transform: scale(0.95);
        }

        .empty-state {
            text-align: center;
            padding: var(--spacing-section) var(--spacing-lg);
            color: var(--ink-muted-48);
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: var(--spacing-md);
        }

        .source-filter-collapsed {
            max-height: 130px;
            overflow: hidden;
            position: relative;
        }

        .source-filter-collapsed::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40px;
            background: linear-gradient(to bottom, rgba(255,255,255,0), var(--canvas));
            pointer-events: none;
            z-index: 10;
        }

        .expand-toggle-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 8px 16px;
            font-size: 14px;
            color: var(--primary);
            background: transparent;
            border: 1px solid var(--primary);
            border-radius: var(--radius-pill);
            cursor: pointer;
            margin-top: var(--spacing-sm);
            margin-left: auto;
            transition: all 0.15s;
            font-weight: 400;
        }

        .expand-toggle-btn:hover {
            background: var(--primary);
            color: var(--on-primary);
        }

        .sidebar-source-filter-collapsed {
            max-height: 120px;
            overflow: hidden;
            position: relative;
        }

        .sidebar-source-filter-collapsed::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40px;
            background: linear-gradient(to bottom, rgba(255,255,255,0), var(--canvas));
            pointer-events: none;
            z-index: 10;
        }

        .sidebar-expand-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 6px 12px;
            font-size: 14px;
            color: var(--primary);
            background: transparent;
            border: 1px solid var(--primary);
            border-radius: var(--radius-pill);
            cursor: pointer;
            margin-top: var(--spacing-sm);
            transition: all 0.15s;
            font-weight: 400;
        }

        .sidebar-expand-btn:hover {
            background: var(--primary);
            color: var(--on-primary);
        }

        .page-btn {
            padding: 8px 16px;
            border: 1px solid var(--hairline);
            border-radius: var(--radius-sm);
            background: var(--canvas);
            font-size: 14px;
            color: var(--ink-muted-48);
            cursor: pointer;
            transition: all 0.15s;
            font-weight: 400;
        }

        .page-btn:hover:not(:disabled) {
            border-color: var(--primary);
            color: var(--primary);
        }

        .page-btn.active {
            background: var(--primary);
            color: var(--on-primary);
            border-color: var(--primary);
        }

        .page-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .date-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: var(--radius-xs);
            font-size: 11px;
            font-weight: 600;
            margin-bottom: var(--spacing-xs);
            letter-spacing: -0.08px;
        }

        .date-badge.upcoming {
            background: #fff3e0;
            color: #ca8a04;
        }

        .date-badge.today {
            background: #fee2e2;
            color: #dc2626;
        }

        .date-badge.tomorrow {
            background: #e3f2fd;
            color: var(--primary);
        }

        .loading {
            text-align: center;
            padding: var(--spacing-xxl);
            color: var(--ink-muted-48);
            font-size: 17px;
        }

        .skeleton-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: var(--spacing-md);
        }

        .skeleton-card {
            background: var(--canvas);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            border: 1px solid var(--hairline);
            border-left: 3px solid var(--hairline);
        }

        .skeleton-line {
            background: linear-gradient(90deg, var(--surface-pearl) 25%, var(--divider-soft) 50%, var(--surface-pearl) 75%);
            background-size: 200% 100%;
            animation: skeleton-shimmer 1.5s infinite;
            border-radius: 4px;
        }

        .skeleton-line.title { height: 20px; width: 70%; margin-bottom: var(--spacing-sm); }
        .skeleton-line.meta { height: 14px; width: 50%; margin-bottom: var(--spacing-xs); }
        .skeleton-line.desc { height: 14px; width: 90%; margin-bottom: var(--spacing-xxs); }
        .skeleton-line.desc.short { width: 60%; }
        .skeleton-line.badge { height: 20px; width: 56px; display: inline-block; margin-right: 6px; border-radius: var(--radius-pill); }

        @keyframes skeleton-shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .exhibition-card { animation: fade-in-up 0.3s ease-out forwards; }
        .exhibition-card:nth-child(1) { animation-delay: 0.02s; }
        .exhibition-card:nth-child(2) { animation-delay: 0.04s; }
        .exhibition-card:nth-child(3) { animation-delay: 0.06s; }
        .exhibition-card:nth-child(4) { animation-delay: 0.08s; }
        .exhibition-card:nth-child(5) { animation-delay: 0.10s; }
        .exhibition-card:nth-child(6) { animation-delay: 0.12s; }
        .exhibition-card:nth-child(7) { animation-delay: 0.14s; }
        .exhibition-card:nth-child(8) { animation-delay: 0.16s; }
        .exhibition-card:nth-child(9) { animation-delay: 0.18s; }

        .clear-filters-btn {
            width: 100%;
            padding: 10px;
            background: var(--surface-pearl);
            border: 1px solid var(--hairline);
            border-radius: var(--radius-sm);
            font-size: 14px;
            color: var(--ink-muted-48);
            cursor: pointer;
            transition: all 0.15s;
            font-weight: 400;
        }

        .clear-filters-btn:hover {
            background: var(--canvas);
            color: var(--primary);
            border-color: var(--primary);
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: var(--spacing-lg);
            backdrop-filter: blur(4px);
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--canvas);
            border-radius: var(--radius-lg);
            max-width: 560px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            border: 1px solid var(--hairline);
        }

        .modal-header {
            background: var(--surface-tile-1);
            color: var(--on-dark);
            padding: var(--spacing-lg);
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .modal-title {
            font-size: 21px;
            font-weight: 600;
            margin-bottom: var(--spacing-xs);
            line-height: 1.19;
            letter-spacing: 0.231px;
        }

        .modal-close {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: var(--on-dark);
            width: 32px; height: 32px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            flex-shrink: 0;
            margin-left: var(--spacing-sm);
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: rotate(90deg);
        }

        .modal-body { padding: var(--spacing-lg); }

        .modal-info-row {
            display: flex;
            margin-bottom: var(--spacing-md);
            align-items: flex-start;
        }

        .modal-info-label {
            width: 70px;
            font-weight: 600;
            color: var(--ink-muted-48);
            flex-shrink: 0;
            font-size: 14px;
            letter-spacing: -0.224px;
        }

        .modal-info-value {
            flex: 1;
            color: var(--ink);
            font-size: 17px;
            font-weight: 400;
            letter-spacing: -0.374px;
        }

        .modal-description {
            margin-top: var(--spacing-xl);
            padding-top: var(--spacing-xl);
            border-top: 1px solid var(--hairline);
        }

        .modal-desc-title {
            font-weight: 600;
            margin-bottom: var(--spacing-sm);
            color: var(--ink);
            font-size: 17px;
            letter-spacing: -0.374px;
        }

        .modal-desc-content {
            line-height: 1.47;
            color: var(--ink-muted-80);
            font-size: 17px;
            letter-spacing: -0.374px;
        }

        .modal-contact {
            margin-top: var(--spacing-lg);
            padding: var(--spacing-lg);
            background: var(--surface-pearl);
            border-radius: var(--radius-lg);
            border: 1px solid var(--divider-soft);
        }

        .modal-contact-title {
            font-weight: 600;
            margin-bottom: var(--spacing-sm);
            color: var(--ink);
            font-size: 14px;
            letter-spacing: -0.224px;
        }

        .modal-contact-info {
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-size: 14px;
            color: var(--ink-muted-80);
            letter-spacing: -0.224px;
        }

        .modal-url {
            color: var(--primary);
            text-decoration: none;
            word-break: break-all;
            font-weight: 400;
        }

        .modal-url:hover { text-decoration: underline; }

        .modal-badges {
            display: flex;
            gap: 6px;
            margin-top: var(--spacing-xs);
            flex-wrap: wrap;
        }

        .modal-original-link { margin-top: var(--spacing-xl); text-align: center; }

        .original-link-btn {
            display: inline-block;
            padding: 11px 28px;
            background: var(--primary);
            color: var(--on-primary);

        function matchSource(exhibition, sourceKey) {
            if (exhibition.source === sourceKey) return true;
            const venueName = sourceToVenue[sourceKey];
            if (venueName && exhibition.venue && exhibition.venue.includes(venueName)) return true;
            return false;
        }

        function getFeeType(exhibition) {
            const name = exhibition.name || '', desc = exhibition.description || '', venue = exhibition.venue || '';
            const freeKeywords = ['免费','公益','免门票','免费开放','免费参与'];
            const paidKeywords = ['收费','门票','购票','票价','预售','报名费用','￥','元'];
            if (freeKeywords.some(kw => name.includes(kw) || desc.includes(kw))) return 'free';
            if (paidKeywords.some(kw => name.includes(kw) || desc.includes(kw))) return 'paid';
            if (['图书馆','宝安科技馆','湾区之眼'].some(v => venue.includes(v))) return 'free';
            if (['会展中心','体育馆','体育场','体育中心'].some(v => venue.includes(v))) return 'paid';
            return 'unknown';
        }

        function getActivityType(exhibition) {
            if (exhibition.category) return exhibition.category;
            const name = exhibition.name || '', venue = exhibition.venue || '';
            if (venue.includes('体育') || name.match(/比赛|健身|运动|足球|篮球|羽毛球|乒乓球|网球|游泳|田径|马拉松|瑜伽|舞蹈|武术/)) return '体育赛事';
            if (venue.includes('科技馆') || name.match(/科学|科普|科技|机器人|编程|3D打印|VR|创客/)) return '科普活动';
            if (venue.includes('湾区之眼') || name.match(/艺术|展览|画展|摄影|雕塑/)) return '展览';
            if (venue.includes('图书馆') || name.match(/讲座|故事会|阅读|沙龙|分享/)) return '讲座阅读';
            if (name.match(/亲子|儿童|手工|夏令营|嘉年华/)) return '亲子活动';
            if (name.match(/音乐会|演唱会|话剧|歌剧|演出|演奏/)) return '演出';
            if (name.match(/电影|放映|观影/)) return '影视放映';
            if (name.match(/展览|展/)) return '展览';
            return '展览';
        }

        function getTypeLabel(type) { return type || '其他'; }

        function getFilteredExhibitions() {
            const now = new Date(), currentYear = now.getFullYear(), currentMonth = now.getMonth(), currentDay = now.getDate();
            const today = now.toISOString().split('T')[0];
            let filtered = allExhibitions;

            if (currentSearchQuery) {
                const query = currentSearchQuery.toLowerCase();
                filtered = filtered.filter(e => (e.name||'').toLowerCase().includes(query) || (e.venue||'').toLowerCase().includes(query) || (e.description||'').toLowerCase().includes(query));
            }
            if (currentDistrictFilter !== 'all') filtered = filtered.filter(e => getDistrict(e.source) === currentDistrictFilter);
            if (currentSourceFilter !== 'all') filtered = filtered.filter(e => matchSource(e, currentSourceFilter));
            if (currentFeeFilter !== 'all') filtered = filtered.filter(e => getFeeType(e) === currentFeeFilter);
            if (currentTypeFilter !== 'all') filtered = filtered.filter(e => getActivityType(e) === currentTypeFilter);
            if (currentFamilyFriendlyFilter === 'family') filtered = filtered.filter(e => e.family_friendly === true);
            else if (currentFamilyFriendlyFilter === 'other') filtered = filtered.filter(e => e.family_friendly !== true);

            switch (currentTimeFilter) {
                case 'today': return filtered.filter(e => e.start_date === today || (e.start_date <= today && e.end_date >= today));
                case 'tomorrow': { const tmr = new Date(now); tmr.setDate(currentDay+1); const tmrStr = tmr.toISOString().split('T')[0]; return filtered.filter(e => e.start_date === tmrStr || (e.start_date <= tmrStr && e.end_date >= tmrStr)); }
                case 'week': { const weekLater = new Date(now); weekLater.setDate(currentDay+7); return filtered.filter(e => e.start_date <= weekLater.toISOString().split('T')[0] && e.end_date >= today); }
                case 'upcoming': return filtered.filter(e => e.start_date >= today);
                case 'month': return filtered.filter(e => { const d=new Date(e.start_date); return d.getFullYear()===currentYear && d.getMonth()===currentMonth; });
                case 'next_month': { let nm=currentMonth+1, ny=currentYear; if(nm>11){nm=0;ny++;} return filtered.filter(e => { const d=new Date(e.start_date); return d.getFullYear()===ny && d.getMonth()===nm; }); }
                default: return filtered;
            }
        }

        function formatDate(dateStr) {
            const d = new Date(dateStr);

        function getDuration(startDate, endDate) {
            if (startDate === endDate) return '1天';

        }

        function getDateBadge(startDate) {
            const now = new Date(), today = now.toISOString().split('T')[0];
            const tmr = new Date(now); tmr.setDate(now.getDate()+1);
            if (startDate === today) return '<div class="date-badge today">今天</div>';
            if (startDate === tmr.toISOString().split('T')[0]) return '<div class="date-badge tomorrow">明天</div>';
            const diffDays = Math.floor((new Date(startDate)-now)/(1000*60*60*24));
            if (diffDays >= 0 && diffDays <= 7) return '<div class="date-badge upcoming">即将开始</div>';
            return '';

            });

            if (totalPages > 1) {
                html += '<div class="pagination" style="grid-column:1/-1;display:flex;justify-content:center;align-items:center;gap:8px;margin:24px 0 12px;flex-wrap:wrap;">';
                html += `<button class="page-btn" ${currentPage===1?'disabled':''} onclick="goToPage(${currentPage-1})">上一页</button>`;
                let startPage = Math.max(1, currentPage-2), endPage = Math.min(totalPages, currentPage+2);
                if (startPage > 1) { html += `<button class="page-btn" onclick="goToPage(1)">1</button>`; if(startPage>2) html+='<span style="color:var(--ink-muted-48);">...</span>'; }

                html += `<button class="page-btn" ${currentPage===totalPages?'disabled':''} onclick="goToPage(${currentPage+1})">下一页</button>`;
                html += '</div>';
            }

            listContainer.innerHTML = html;
            document.querySelectorAll('.exhibition-card').forEach(card => {
                card.addEventListener('click', function() {
                    const idx = parseInt(this.dataset.idx);
                    openModal(idx);

            if (countEl) countEl.textContent = stats[source];
            if (typeof trackEvent === 'function') trackEvent('活动详情', '点击原始链接', source);
            console.log(`点击记录: ${source} - ${activityName} (累计: ${stats[source]}次)`);
        }

        function toggleDesc(descId) {
            const el = document.getElementById(`desc-${descId}`);
            const link = document.querySelector(`.expand-link[data-desc-id="${descId}"]`);
            if (el.classList.contains('expanded')) { el.classList.remove('expanded'); link.textContent = '展开 ↓'; }
            else { el.classList.add('expanded'); link.textContent = '收起 ↑'; }
        }

        function handleSearch() {
            currentSearchQuery = document.getElementById('search-input').value || document.getElementById('search-input-desktop').value || '';
            currentPage = 1;
            renderExhibitions();
        }

        function toggleSourceFilter() {
            const bar = document.getElementById('source-filter-bar');
            const btn = document.getElementById('source-expand-btn');
            if (bar.classList.contains('source-filter-collapsed')) { bar.classList.remove('source-filter-collapsed'); btn.textContent = '收起 ↑'; }
            else { bar.classList.add('source-filter-collapsed'); btn.textContent = '展开更多 ▼'; }
        }

        function toggleSidebarSourceFilter() {
            const bar = document.getElementById('sidebar-source-filter-bar');
            const btn = document.getElementById('sidebar-source-expand-btn');
            if (bar.classList.contains('sidebar-source-filter-collapsed')) { bar.classList.remove('sidebar-source-filter-collapsed'); btn.textContent = '收起 ↑'; }
            else { bar.classList.add('sidebar-source-filter-collapsed'); btn.textContent = '展开更多 ▼'; }
        }

        function clearAllFilters() {
            currentTimeFilter = 'upcoming'; currentSourceFilter = 'all'; currentFeeFilter = 'all';
            currentTypeFilter = 'all'; currentDistrictFilter = 'all'; currentFamilyFriendlyFilter = 'family';
            currentSearchQuery = ''; currentPage = 1;
            document.getElementById('search-input').value = '';
            document.getElementById('search-input-desktop').value = '';
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            renderExhibitions();
        }

        document.querySelectorAll('[data-filter]').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentTimeFilter = this.dataset.filter;
                localStorage.setItem('schedule_time_filter', currentTimeFilter);
                currentPage = 1;
                renderExhibitions();
            });
        });

        document.querySelectorAll('[data-source]').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('[data-source]').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentSourceFilter = this.dataset.source;
                localStorage.setItem('schedule_source_filter', currentSourceFilter);
                currentPage = 1;
                renderExhibitions();
            });
        });

        document.querySelectorAll('[data-fee]').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('[data-fee]').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFeeFilter = this.dataset.fee;
                localStorage.setItem('schedule_fee_filter', currentFeeFilter);
                currentPage = 1;
                renderExhibitions();
            });
        });

        document.querySelectorAll('[data-type]').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('[data-type]').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentTypeFilter = this.dataset.type;
                localStorage.setItem('schedule_type_filter', currentTypeFilter);
                currentPage = 1;
                renderExhibitions();
            });
        });

        document.querySelectorAll('[data-district]').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('[data-district]').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentDistrictFilter = this.dataset.district;
                localStorage.setItem('schedule_district_filter', currentDistrictFilter);
                currentPage = 1;
                renderExhibitions();
            });
        });

        document.querySelectorAll('[data-family]').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('[data-family]').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFamilyFriendlyFilter = this.dataset.family;
                localStorage.setItem('schedule_family_filter', currentFamilyFriendlyFilter);
                currentPage = 1;
                renderExhibitions();
            });
        });

        document.getElementById('modal-overlay').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });

        fetch('output/exhibitions.json')
            .then(response => response.json())
            .then(data => {
                allExhibitions = data;
                renderExhibitions();
            })
            .catch(error => {
                console.error('Failed to load exhibitions:', error);
                document.getElementById('exhibition-list').innerHTML = '<div class="empty-state"><div class="icon">❌</div><div>加载失败，请稍后重试</div></div>';
            });
    </script>
</body>
</html>
