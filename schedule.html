<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        if (location.hostname === 'islon.github.io' && location.pathname.startsWith('/shenzhen-exhibitions')) {
            location.replace(location.href.replace('/shenzhen-exhibitions', '/goout'));
        }
    </script>
    <meta http-equiv="Cache-Control" content="public, max-age=86400">
    <title>童行 (深圳亲子活动)</title>
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
    <link rel="icon" type="image/png" sizes="48x48" href="favicon-48.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <style>
        :root {
            --sand-primary: #D4A373;
            --sand-light: #E8D5BC;
            --sand-dark: #B8895A;
            --sand-bg: #FDF6ED;
            --sand-50: #FFFBF5;
            --sand-100: #FDF6ED;
            --sand-200: #F5E6D3;
            --ocean: #0891B2;
            --ocean-light: #E0F2F7;
            --forest: #166534;
            --forest-light: #DCFCE7;
            --bg-warm: #FFFDF7;
            --surface: #FFFFFF;
            --text-primary: #292524;
            --text-secondary: #78716C;
            --text-muted: #A8A29E;
            --border: #F5F0E8;
            --border-strong: #E7DFD3;
            --success: #166534;
            --warning: #CA8A04;
            --error: #DC2626;
            --info: #0891B2;
            --shadow-sm: 0 1px 2px rgba(212, 163, 115, 0.05);
            --shadow-md: 0 4px 12px rgba(212, 163, 115, 0.08);
            --shadow-lg: 0 12px 24px rgba(212, 163, 115, 0.12);
            --shadow-xl: 0 20px 40px rgba(212, 163, 115, 0.15);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg-warm);
            min-height: 100vh;
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
        }

        .header {
            background: linear-gradient(135deg, var(--sand-primary) 0%, var(--sand-dark) 100%);
            color: white;
            padding: 16px 20px 20px;
            border-bottom: none;
            position: relative;
            box-shadow: var(--shadow-md);
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -5%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }

        .subscribe-link {
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.35);
            color: white;
            border-radius: 20px;
            font-size: 12px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }

        .subscribe-link:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-1px);
        }

        .feedback-link {
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.35);
            color: white;
            border-radius: 20px;
            font-size: 12px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }

        .feedback-link:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-1px);
        }

        .header h1 {
            font-size: 20px;
            font-weight: 700;
            text-align: center;
            margin: 0;
            letter-spacing: -0.3px;
        }

        .header-subtitle {
            text-align: center;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.85);
            margin-top: 4px;
            font-weight: 400;
        }

        .main-wrapper {
            display: flex;
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px;
            gap: 20px;
        }

        .sidebar {
            width: 260px;
            flex-shrink: 0;
            display: none;
        }

        .sidebar-card {
            background: var(--surface);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 1px 3px rgba(212, 163, 115, 0.08);
            border: 1px solid var(--border);
        }

        .sidebar-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
            letter-spacing: -0.2px;
        }

        .filter-section-mobile {
            background: var(--surface);
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
        }

        .filter-section-mobile--right-align {
            display: flex;
            flex-direction: column;
        }

        .filter-section-mobile--right-align .filter-bar {
            align-self: flex-start;
        }

        .filter-label {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 10px;
            padding-left: 4px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-bar {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding-bottom: 2px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 7px 14px;
            background: var(--surface);
            border: 1.5px solid var(--border-strong);
            border-radius: 24px;
            font-size: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
            font-weight: 500;
        }

        .filter-btn.active {
            background: linear-gradient(135deg, var(--sand-primary) 0%, var(--sand-dark) 100%);
            color: white;
            border-color: var(--sand-primary);
            box-shadow: 0 2px 8px rgba(212, 163, 115, 0.3);
            font-weight: 600;
        }

        .filter-btn:hover:not(.active) {
            background: var(--sand-50);
            color: var(--sand-dark);
            border-color: var(--sand-light);
            transform: translateY(-1px);
        }

        .filter-btn:active {
            transform: scale(0.97);
        }

        .search-container {
            position: relative;
            margin-bottom: 12px;
        }

        .search-input {
            width: 100%;
            padding: 12px 40px 12px 16px;
            border: 1.5px solid var(--border-strong);
            border-radius: var(--radius-xl);
            font-size: 14px;
            background: var(--surface);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--text-primary);
            box-shadow: var(--shadow-sm);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--sand-primary);
            background: var(--surface);
            box-shadow: 0 0 0 4px rgba(212, 163, 115, 0.12), var(--shadow-sm);
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .search-icon {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 16px;
            pointer-events: none;
            transition: color 0.2s;
        }

        .search-input:focus + .search-icon {
            color: var(--sand-primary);
        }

        .content {
            flex: 1;
            min-width: 0;
        }

        .count-info {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 12px;
            text-align: right;
        }

        .exhibition-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .exhibition-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 16px;
            box-shadow: var(--shadow-sm);
            border-left: 3px solid var(--border-strong);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--border);
            border-left: 3px solid var(--border-strong);
            opacity: 0;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .exhibition-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--sand-light), transparent);
            opacity: 0.5;
        }

        .exhibition-card::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle at top right, rgba(212, 163, 115, 0.06), transparent 70%);
            pointer-events: none;
        }

        .exhibition-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
            border-color: var(--sand-light);
        }

        .exhibition-card:active {
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        /* 按分类着色 */
        .exhibition-card.cat-展览 { border-left-color: var(--ocean); }
        .exhibition-card.cat-讲座阅读 { border-left-color: #8B5CF6; }
        .exhibition-card.cat-科普活动 { border-left-color: var(--forest); }
        .exhibition-card.cat-演出 { border-left-color: var(--warning); }
        .exhibition-card.cat-影视放映 { border-left-color: #DB2777; }
        .exhibition-card.cat-体育赛事 { border-left-color: var(--error); }
        .exhibition-card.cat-亲子活动 { border-left-color: var(--sand-primary); }
        .exhibition-card.cat-其他 { border-left-color: var(--text-muted); }

        .exhibition-header {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 8px;
        }

        .exhibition-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.4;
            letter-spacing: -0.2px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .exhibition-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            flex-shrink: 0;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            line-height: 1.2;
        }

        .badge.free {
            background: var(--forest-light);
            color: var(--forest);
            border: 1px solid rgba(22, 101, 52, 0.2);
        }

        .badge.free::before {
            content: '✓';
            font-weight: 700;
        }

        .badge.paid {
            background: #FEF3C7;
            color: var(--warning);
            border: 1px solid rgba(202, 138, 4, 0.2);
        }

        .badge.paid::before {
            content: '💰';
            font-size: 10px;
        }

        .badge.family {
            background: #FFE4E6;
            color: #BE123C;
            border: 1px solid rgba(190, 18, 60, 0.2);
        }

        .badge.family::before {
            content: '👨‍👩‍👧';
            font-size: 10px;
        }

        .badge.type-展览 { background: var(--ocean-light); color: var(--ocean); border: 1px solid rgba(8, 145, 178, 0.15); }
        .badge.type-讲座阅读 { background: #EDE9FE; color: #7C3AED; border: 1px solid rgba(124, 58, 237, 0.15); }
        .badge.type-科普活动 { background: var(--forest-light); color: var(--forest); border: 1px solid rgba(22, 101, 52, 0.15); }
        .badge.type-演出 { background: #FEF3C7; color: var(--warning); border: 1px solid rgba(202, 138, 4, 0.15); }
        .badge.type-影视放映 { background: #FCE7F3; color: #BE185D; border: 1px solid rgba(190, 24, 93, 0.15); }
        .badge.type-体育赛事 { background: #FEE2E2; color: var(--error); border: 1px solid rgba(220, 38, 38, 0.15); }
        .badge.type-亲子活动 { background: var(--sand-bg); color: var(--sand-dark); border: 1px solid rgba(212, 163, 115, 0.25); }
        .badge.type-其他 { background: #F1F5F9; color: #64748B; border: 1px solid rgba(100, 116, 139, 0.15); }

        .exhibition-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            margin-top: 6px;
        }

        .exhibition-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .exhibition-desc {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 10px;
        }

        .exhibition-desc.empty {
            color: var(--text-muted);
            font-style: italic;
        }

        .exhibition-link {
            display: inline-block;
            padding: 5px 12px;
            background: linear-gradient(135deg, var(--sand-primary) 0%, var(--sand-dark) 100%);
            color: white;
            border-radius: 8px;
            font-size: 11px;
            text-decoration: none;
            font-weight: 600;
            text-align: left;
            transition: all 0.15s;
            box-shadow: 0 1px 3px rgba(212, 163, 115, 0.2);
            margin-top: auto;
            align-self: flex-start;
        }

        .exhibition-link:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(212, 163, 115, 0.3);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .source-filter-collapsed {
            max-height: 130px;
            overflow: hidden;
            position: relative;
        }

        .source-filter-collapsed::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40px;
            background: linear-gradient(to bottom, rgba(255,255,255,0), var(--surface));
            pointer-events: none;
            z-index: 10;
        }

        .expand-toggle-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 8px 16px;
            font-size: 13px;
            color: var(--sand-dark);
            background: var(--surface);
            border: 1px solid var(--sand-light);
            border-radius: 20px;
            cursor: pointer;
            margin-top: 8px;
            margin-left: auto;
            transition: all 0.2s;
            font-weight: 500;
        }

        .expand-toggle-btn:hover {
            background: var(--sand-bg);
            border-color: var(--sand-primary);
        }

        .sidebar-source-filter-collapsed {
            max-height: 120px;
            overflow: hidden;
            position: relative;
        }

        .sidebar-source-filter-collapsed::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40px;
            background: linear-gradient(to bottom, rgba(255,255,255,0), var(--surface));
            pointer-events: none;
            z-index: 10;
        }

        .sidebar-expand-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 6px 12px;
            font-size: 12px;
            color: var(--sand-dark);
            background: var(--sand-bg);
            border: 1px solid var(--sand-light);
            border-radius: 16px;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s;
            font-weight: 500;
        }

        .sidebar-expand-btn:hover {
            background: var(--sand-light);
        }

        .page-btn {
            padding: 6px 12px;
            border: 1px solid var(--border-strong);
            border-radius: 8px;
            background: var(--surface);
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .page-btn:hover:not(:disabled) {
            border-color: var(--sand-primary);
            color: var(--sand-dark);
            background: var(--sand-bg);
        }

        .page-btn.active {
            background: linear-gradient(135deg, var(--sand-primary) 0%, var(--sand-dark) 100%);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 2px 6px rgba(212, 163, 115, 0.3);
        }

        .page-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .date-badge {
            display: inline-block;
            padding: 2px 7px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 700;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .date-badge.upcoming {
            background: #FEF3C7;
            color: var(--warning);
        }

        .date-badge.today {
            background: #FEE2E2;
            color: var(--error);
        }

        .date-badge.tomorrow {
            background: var(--ocean-light);
            color: var(--ocean);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 14px;
        }

        /* 骨架屏 - 离线优先设计 */
        .skeleton-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .skeleton-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 16px;
            border: 1px solid var(--border);
            border-left: 3px solid var(--border-strong);
        }

        .skeleton-line {
            background: linear-gradient(
                90deg,
                var(--sand-100) 25%,
                var(--sand-200) 50%,
                var(--sand-100) 75%
            );
            background-size: 200% 100%;
            animation: skeleton-shimmer 1.5s infinite;
            border-radius: 4px;
        }

        .skeleton-line.title {
            height: 18px;
            width: 70%;
            margin-bottom: 10px;
        }

        .skeleton-line.meta {
            height: 12px;
            width: 50%;
            margin-bottom: 8px;
        }

        .skeleton-line.desc {
            height: 12px;
            width: 90%;
            margin-bottom: 6px;
        }

        .skeleton-line.desc.short {
            width: 60%;
        }

        .skeleton-line.badge {
            height: 20px;
            width: 48px;
            display: inline-block;
            margin-right: 6px;
            border-radius: 6px;
        }

        @keyframes skeleton-shimmer {
            0% {
                background-position: 200% 0;
            }
            100% {
                background-position: -200% 0;
            }
        }

        @media (min-width: 768px) {
            .skeleton-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 16px;
            }
            .skeleton-card {
                padding: 20px;
            }
        }

        @media (min-width: 1200px) {
            .skeleton-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* 入场动画 */
        @keyframes fade-in-up {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .exhibition-card {
            animation: fade-in-up 0.3s ease-out forwards;
        }

        .exhibition-card:nth-child(1) { animation-delay: 0.02s; }
        .exhibition-card:nth-child(2) { animation-delay: 0.04s; }
        .exhibition-card:nth-child(3) { animation-delay: 0.06s; }
        .exhibition-card:nth-child(4) { animation-delay: 0.08s; }
        .exhibition-card:nth-child(5) { animation-delay: 0.10s; }
        .exhibition-card:nth-child(6) { animation-delay: 0.12s; }
        .exhibition-card:nth-child(7) { animation-delay: 0.14s; }
        .exhibition-card:nth-child(8) { animation-delay: 0.16s; }
        .exhibition-card:nth-child(9) { animation-delay: 0.18s; }

        .clear-filters-btn {
            width: 100%;
            padding: 10px;
            background: var(--bg-warm);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .clear-filters-btn:hover {
            background: var(--sand-bg);
            color: var(--sand-dark);
            border-color: var(--sand-light);
        }

        @media (min-width: 768px) {
            .header h1 {
                font-size: 28px;
            }

            .header-top {
                padding: 0 20px;
            }

            .exhibition-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 16px;
            }

            .exhibition-card {
                padding: 20px;
            }

            .exhibition-title {
                font-size: 17px;
            }

            .exhibition-meta {
                font-size: 13px;
            }

            .exhibition-desc {
                font-size: 13px;
            }

            .content {
                padding: 0;
            }
        }

        @media (min-width: 1024px) {
            .sidebar {
                display: block;
            }

            .filter-section-mobile {
                display: none;
            }

            .exhibition-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .main-wrapper {
                padding: 16px;
            }

            .content {
                margin-top: 0;
            }

            .header {
                padding: 12px 20px 16px;
            }

            .header h1 {
                font-size: 24px;
            }
        }

        @media (min-width: 1200px) {
            .exhibition-grid {
                grid-template-columns: repeat(3, 1fr);
                grid-auto-rows: 1fr;
            }
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1000;

        // source key 到场馆名的映射（用于筛选匹配）
        const sourceToVenue = {
            'szlib': '深圳图书馆', 'sz_children_lib': '深圳少儿图书馆', 'szbwg': '深圳博物馆',
            'szstm': '深圳科学技术馆', 'szcp': '深圳市少年宫', 'szaac': '深圳市青少年活动中心',
            'sznm': '深圳自然博物馆', 'szbo': '深圳滨海艺术中心', 'szconcert': '深圳音乐厅',
            'szmocap': '当代艺术与城市规划馆', 'szsports': '深圳市体育中心', 'szmassart': '深圳市文化馆',
            'nslib': '南山图书馆', 'balib': '宝安图书馆', 'ftlib': '福田区图书馆',
            'lhlib': '罗湖区图书馆', 'lglib': '龙岗区图书馆', 'lhxqlib': '龙华区图书馆',
            'gmlib': '光明区图书馆', 'pslib': '坪山区图书馆', 'ytlib': '盐田区图书馆',
            'dplib': '大鹏新区图书馆', 'nsmuseum': '南山博物馆', 'lgmuseum': '龙岗区博物馆',
            'bamuseum': '宝安区博物馆', 'lhmuseum': '龙华区博物馆', 'lhmuseum2': '罗湖区博物馆',
            'dpgeopark': '大鹏地质公园博物馆', 'baoan_kjg': '宝安科技馆', 'lgkjg': '龙岗区科技馆',
            'lhkjg': '龙华区科技馆', 'ytkjg': '盐田区科技馆', 'gm_kjg': '光明区科技馆',
            'baoan_qsng': '宝安区青少年宫', 'nsqsng': '南山区青少年活动中心',
            'lgqsng': '龙岗区青少年宫', 'lhqsng': '龙华区青少年宫',
            'lhqsng2': '罗湖区青少年活动中心', 'gmqsng': '光明区青少年活动中心',
            'psqsng': '坪山区青少年宫', 'baoan_ty': '宝安体育中心', 'nswtzx': '南山文体中心',
            'szwty': '深圳湾体育中心', 'lhtyzx': '龙岗体育中心', 'lhwtx': '龙华文体中心',
            'gmtyzx': '光明区群众体育中心', 'lhtyzx2': '罗湖区体育中心',
            'pstyzx': '坪山体育中心', 'yttyzx': '盐田体育中心',
            'nswhg': '南山区文化馆', 'baoan_1990': '宝安1990文化馆',
            'bayarea_eye': '湾区之眼', 'baoan_guihua': '宝安城市规划展览馆',
            'lgguihua': '龙岗城市规划展览馆', 'nsguihua': '南山城市规划展览馆',
            'lh_printmaking': '中国版画博物馆', 'nsaqjy': '南山安全教育体验馆',
            'skhykpg': '蛇口海洋科普馆',
        };

        function matchSource(exhibition, sourceKey) {
            if (exhibition.source === sourceKey) return true;
            const venueName = sourceToVenue[sourceKey];
            if (venueName && exhibition.venue && exhibition.venue.includes(venueName)) return true;
            return false;
        }

        function getFeeType(exhibition) {
            const name = exhibition.name || '';
            const desc = exhibition.description || '';
            const venue = exhibition.venue || '';
            
            const freeKeywords = ['免费', '公益', '免门票', '免费开放', '免费参与'];
            const paidKeywords = ['收费', '门票', '购票', '票价', '预售', '报名费用', '￥', '元'];
            
            if (freeKeywords.some(kw => name.includes(kw) || desc.includes(kw))) {
                return 'free';
            }
            
            if (paidKeywords.some(kw => name.includes(kw) || desc.includes(kw))) {
                return 'paid';
            }
            
            const freeVenues = ['图书馆', '宝安科技馆', '湾区之眼'];
            if (freeVenues.some(v => venue.includes(v))) {
                return 'free';
            }
            
            const paidVenues = ['会展中心', '体育馆', '体育场', '体育中心'];
            if (paidVenues.some(v => venue.includes(v))) {
                return 'paid';
            }
            
            return 'unknown';
        }

        function getActivityType(exhibition) {
            if (exhibition.category) {
                return exhibition.category;
            }
            const name = exhibition.name || '';
            const venue = exhibition.venue || '';

            if (venue.includes('体育') || name.includes('比赛') || name.includes('健身') || 
                name.includes('运动') || name.includes('足球') || name.includes('篮球') ||
                name.includes('羽毛球') || name.includes('乒乓球') || name.includes('网球') ||
                name.includes('游泳') || name.includes('田径') || name.includes('马拉松') ||
                name.includes('瑜伽') || name.includes('舞蹈') || name.includes('武术')) {
                return '体育赛事';
            }

            if (venue.includes('科技馆') || name.includes('科学') || name.includes('科普') ||
                name.includes('科技') || name.includes('机器人') || name.includes('编程') ||
                name.includes('3D打印') || name.includes('VR') || name.includes('创客')) {
                return '科普活动';
            }

            if (venue.includes('湾区之眼') || name.includes('艺术') || name.includes('展览') ||
                name.includes('画展') || name.includes('摄影') || name.includes('雕塑')) {
                return '展览';
            }

            if (venue.includes('图书馆') || name.includes('讲座') || name.includes('故事会') ||
                name.includes('阅读') || name.includes('沙龙') || name.includes('分享')) {
                return '讲座阅读';
            }

            if (name.includes('亲子') || name.includes('儿童') || name.includes('手工') ||
                name.includes('夏令营') || name.includes('嘉年华')) {
                return '亲子活动';
            }

            if (name.includes('音乐会') || name.includes('演唱会') || name.includes('话剧') ||
                name.includes('歌剧') || name.includes('演出') || name.includes('演奏')) {
                return '演出';
            }

            if (name.includes('电影') || name.includes('放映') || name.includes('观影')) {
                return '影视放映';
            }

            if (name.includes('展览') || name.includes('展')) {
                return '展览';
            }

            return '展览';
        }

        function getTypeLabel(type) {
            return type || '其他';
        }

        function getFilteredExhibitions() {
            const now = new Date();
            const currentYear = now.getFullYear();
            const currentMonth = now.getMonth();
            const currentDay = now.getDate();
            const today = now.toISOString().split('T')[0];

            let filtered = allExhibitions;

            if (currentSearchQuery) {
                const query = currentSearchQuery.toLowerCase();
                filtered = filtered.filter(e => 
                    (e.name || '').toLowerCase().includes(query) ||
                    (e.venue || '').toLowerCase().includes(query) ||
                    (e.description || '').toLowerCase().includes(query)
                );
            }

            if (currentDistrictFilter !== 'all') {
                filtered = filtered.filter(e => getDistrict(e.source) === currentDistrictFilter);
            }

            if (currentSourceFilter !== 'all') {
                filtered = filtered.filter(e => matchSource(e, currentSourceFilter));
            }

            if (currentFeeFilter !== 'all') {
                filtered = filtered.filter(e => getFeeType(e) === currentFeeFilter);
            }

            if (currentTypeFilter !== 'all') {
                filtered = filtered.filter(e => getActivityType(e) === currentTypeFilter);
            }

            if (currentFamilyFriendlyFilter === 'family') {
                filtered = filtered.filter(e => e.family_friendly === true);
            } else if (currentFamilyFriendlyFilter === 'other') {
                filtered = filtered.filter(e => e.family_friendly !== true);
            }

            switch (currentTimeFilter) {
                case 'today':
                    return filtered.filter(e => e.start_date === today || 
                        (e.start_date <= today && e.end_date >= today));

                case 'tomorrow':
                    const tomorrow = new Date(now);
                    tomorrow.setDate(currentDay + 1);
                    const tomorrowStr = tomorrow.toISOString().split('T')[0];
                    return filtered.filter(e => e.start_date === tomorrowStr ||
                        (e.start_date <= tomorrowStr && e.end_date >= tomorrowStr));

                case 'week':
                    const weekLater = new Date(now);
                    weekLater.setDate(currentDay + 7);
                    const weekLaterStr = weekLater.toISOString().split('T')[0];
                    return filtered.filter(e => e.start_date <= weekLaterStr && e.end_date >= today);

                case 'upcoming':
                    return filtered.filter(e => e.start_date >= today);

                case 'month':
                    return filtered.filter(e => {
                        const date = new Date(e.start_date);
                        return date.getFullYear() === currentYear && date.getMonth() === currentMonth;
                    });

                case 'next_month':
                    let nextMonth = currentMonth + 1;
                    let nextYear = currentYear;
                    if (nextMonth > 11) {
                        nextMonth = 0;
                        nextYear++;
                    }
                    return filtered.filter(e => {
                        const date = new Date(e.start_date);
                        return date.getFullYear() === nextYear && date.getMonth() === nextMonth;
                    });

                case 'all':
                default:
                    return filtered;
            }
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const year = date.getFullYear();
            const month = date.getMonth() + 1;
            const day = date.getDate();
            const weekDays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            const weekDay = weekDays[date.getDay()];
            return `${month}月${day}日 ${weekDay}`;
        }

        function getDuration(startDate, endDate) {
            if (startDate === endDate) return '1天';
            const start = new Date(startDate);
            const end = new Date(endDate);
            const days = Math.floor((end - start) / (1000 * 60 * 60 * 24)) + 1;
            return `${days}天`;
        }

        function getDateBadge(startDate) {
            const now = new Date();
            const today = now.toISOString().split('T')[0];
            const tomorrow = new Date(now);
            tomorrow.setDate(now.getDate() + 1);
            const tomorrowStr = tomorrow.toISOString().split('T')[0];

            if (startDate === today) return '<div class="date-badge today">今天</div>';
            if (startDate === tomorrowStr) return '<div class="date-badge tomorrow">明天</div>';
            
            const diffDays = Math.floor((new Date(startDate) - now) / (1000 * 60 * 60 * 24));
            if (diffDays >= 0 && diffDays <= 7) return '<div class="date-badge upcoming">即将开始</div>';
            
            return '';
        }

        function renderExhibitions() {
            const listContainer = document.getElementById('exhibition-list');
            const countInfo = document.getElementById('count-info');

            const filtered = getFilteredExhibitions();
            filtered.sort((a, b) => a.start_date.localeCompare(b.start_date));
            filteredExhibitions = filtered;

            if (currentPage > Math.ceil(filtered.length / PAGE_SIZE)) {
                currentPage = 1;
            }

            const startIdx = (currentPage - 1) * PAGE_SIZE;
            const endIdx = Math.min(startIdx + PAGE_SIZE, filtered.length);
            const pageItems = filtered.slice(startIdx, endIdx);
            const totalPages = Math.ceil(filtered.length / PAGE_SIZE);

            countInfo.textContent = `共 ${filtered.length} 个活动（第 ${currentPage}/${totalPages || 1} 页）`;

            if (filtered.length === 0) {
                listContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <div>该筛选条件下暂无活动</div>
                        <div style="font-size: 13px; margin-top: 8px; color: #bbb;">试试其他筛选条件</div>
                    </div>
                `;
                return;
            }

            let html = '';
            let currentMonth = '';

            pageItems.forEach((exhibition, localIdx) => {
                const globalIdx = startIdx + localIdx;
                const startDate = exhibition.start_date;
                const endDate = exhibition.end_date;
                const monthKey = startDate.substring(0, 7);

                if (monthKey !== currentMonth) {
                    currentMonth = monthKey;
                    const [year, month] = monthKey.split('-');
                    html += `<div style="font-size: 16px; font-weight: 600; color: #333; margin: 20px 0 12px; padding-left: 4px; grid-column: 1 / -1;">${year}年${parseInt(month)}月</div>`;
                }

                const dateBadge = getDateBadge(startDate);
                const feeType = getFeeType(exhibition);
                const activityType = getActivityType(exhibition);
                
                const feeBadge = feeType === 'free' ? `<span class="badge free">免费</span>` : 
                                feeType === 'paid' ? `<span class="badge paid">收费</span>` : '';
                const typeBadge = `<span class="badge type-${activityType}">${getTypeLabel(activityType)}</span>`;
                const familyBadge = (exhibition.family_friendly === true && activityType !== 'family') ? `<span class="badge family">👶 适合亲子</span>` : '';
                
                const dateDisplay = startDate === endDate 
                    ? formatDate(startDate) 
                    : `${startDate.substring(5)} ~ ${endDate.substring(5)}`;

                const cardId = exhibition.id || `${exhibition.source}-${exhibition.name}-${startDate}`;
                html += `
                    <div class="exhibition-card cat-${activityType}" data-id="${cardId}" data-idx="${globalIdx}">
                        ${dateBadge}
                        <div class="exhibition-header">
                            <div class="exhibition-title">${exhibition.name}</div>
                            <div class="exhibition-badges">
                                ${typeBadge}
                                ${feeBadge}
                                ${familyBadge}
                            </div>
                        </div>
                        <div class="exhibition-meta">
                            <span>📅 ${dateDisplay}</span>
                            <span>⏱️ ${getDuration(startDate, endDate)}</span>
                            <span>📍 ${exhibition.venue}</span>
                        </div>
                        ${exhibition.description
                            ? `<div class="exhibition-desc">${exhibition.description}</div>`
                            : `<div class="exhibition-desc empty">暂无详细介绍</div>`}
                        <div class="exhibition-link">点击查看详情 →</div>
                    </div>
                `;
            });

            if (totalPages > 1) {
                html += '<div class="pagination" style="grid-column: 1 / -1; display: flex; justify-content: center; align-items: center; gap: 8px; margin: 24px 0 12px; flex-wrap: wrap;">';
                
                html += `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="goToPage(${currentPage - 1})">上一页</button>`;
                
                let startPage = Math.max(1, currentPage - 2);
                let endPage = Math.min(totalPages, currentPage + 2);
                if (startPage > 1) {
                    html += `<button class="page-btn" onclick="goToPage(1)">1</button>`;
                    if (startPage > 2) html += '<span style="color: #999;">...</span>';
                }
                for (let p = startPage; p <= endPage; p++) {
                    html += `<button class="page-btn ${p === currentPage ? 'active' : ''}" onclick="goToPage(${p})">${p}</button>`;
                }
                if (endPage < totalPages) {
                    if (endPage < totalPages - 1) html += '<span style="color: #999;">...</span>';
                    html += `<button class="page-btn" onclick="goToPage(${totalPages})">${totalPages}</button>`;
                }
                
                html += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="goToPage(${currentPage + 1})">下一页</button>`;
                html += '</div>';
            }

            listContainer.innerHTML = html;
            
            document.querySelectorAll('.exhibition-card').forEach(card => {
                card.addEventListener('click', function() {
                    const idx = parseInt(this.dataset.idx);
                    openModal(idx);
                    
                    if (typeof trackEvent === 'function') {
                        trackEvent('活动详情', '打开弹窗', filtered[idx].source);
                    }
                });
            });

        }

        function getVenueAddress(source) {
            return venueAddressMap[source] || '';
        }

        function openModal(filteredIndex) {
            const filtered = getFilteredExhibitions();
            const exhibition = filtered[filteredIndex];
            const overlay = document.getElementById('modal-overlay');
            const title = document.getElementById('modal-title');
            const badges = document.getElementById('modal-badges');
            const body = document.getElementById('modal-body');

            title.textContent = exhibition.name;

            const feeType = getFeeType(exhibition);
            const activityType = getActivityType(exhibition);
            const feeBadge = feeType === 'free' ? `<span class="badge free">免费</span>` : 
                            feeType === 'paid' ? `<span class="badge paid">收费</span>` : '';
            const typeBadge = `<span class="badge type-${activityType}">${getTypeLabel(activityType)}</span>`;
            const familyBadge = (exhibition.family_friendly === true && activityType !== 'family') ? `<span class="badge family">👶 适合亲子</span>` : '';
            badges.innerHTML = `${typeBadge} ${feeBadge} ${familyBadge}`;

            const startDate = exhibition.start_date;
            const endDate = exhibition.end_date;
            const dateDisplay = startDate === endDate 
                ? formatDate(startDate) 
                : `${formatDate(startDate)} ~ ${formatDate(endDate)}`;

            body.innerHTML = `
                <div class="modal-info-row">
                    <div class="modal-info-label">📅 时间</div>
                    <div class="modal-info-value">${dateDisplay}</div>
                </div>
                <div class="modal-info-row">
                    <div class="modal-info-label">📍 地点</div>
                    <div class="modal-info-value">${exhibition.venue}</div>
                </div>
                ${getVenueAddress(exhibition.source) ? `
                <div class="modal-info-row">
                    <div class="modal-info-label">🏠 地址</div>
                    <div class="modal-info-value">${getVenueAddress(exhibition.source)}</div>
                </div>
                ` : ''}
                <div class="modal-info-row">
                    <div class="modal-info-label">⏱️ 时长</div>
                    <div class="modal-info-value">${getDuration(startDate, endDate)}</div>
                </div>
                ${exhibition.description ? `
                <div class="modal-description">
                    <div class="modal-desc-title">📝 活动介绍</div>
                    <div class="modal-desc-content">${exhibition.description}</div>
                </div>
                ` : ''}
                ${exhibition.url ? `
                <div class="modal-original-link">
                    <a href="${exhibition.url}" target="_blank" rel="noopener" class="original-link-btn" id="original-link-btn">
                        🔗 查看原始活动详情
                    </a>
                    <div style="font-size: 11px; color: #999; margin-top: 6px;" id="click-stats-display"></div>
                </div>
                ` : ''}
                <div class="modal-contact">
                    <div class="modal-contact-title">📞 联系信息</div>
                    <div class="modal-contact-info">
                        ${exhibition.contact ? `<div>电话：${exhibition.contact}</div>` : ''}
                        ${!exhibition.url && exhibition.source_url ? `<div>官网：<a href="${exhibition.source_url}" target="_blank" class="modal-url">${exhibition.source_url}</a></div>` : ''}
                    </div>
                </div>

            overlay.classList.add('active');

            // 绑定点击统计
            const linkBtn = document.getElementById('original-link-btn');
            const statsDisplay = document.getElementById('click-stats-display');
            if (linkBtn && exhibition.url) {
                const currentSource = exhibition.source;
                const stats = getClickStats();
                const count = stats[currentSource] || 0;
                if (statsDisplay) {
                    statsDisplay.textContent = `已点击查看: ${count} 次`;
                }

                linkBtn.addEventListener('click', function() {
                    trackClick(currentSource, exhibition.name);

        function closeModal() {
            const overlay = document.getElementById('modal-overlay');
            overlay.classList.remove('active');
        }

        // 点击统计功能
        function getClickStats() {
            const stats = localStorage.getItem('click_stats');
            return stats ? JSON.parse(stats) : {};
        }

        function getClickCount(source) {
            const stats = getClickStats();
            return stats[source] || 0;
        }

        function trackClick(source, activityName) {
            const stats = getClickStats();
            stats[source] = (stats[source] || 0) + 1;
            localStorage.setItem('click_stats', JSON.stringify(stats));

            // 更新显示
            const countEl = document.getElementById(`click-count-${source}`);
            if (countEl) {
                countEl.textContent = stats[source];
            }

            // 百度统计事件追踪
            if (typeof trackEvent === 'function') {
                trackEvent('活动详情', '点击原始链接', source);
            }

            console.log(`点击记录: ${source} - ${activityName} (累计: ${stats[source]}次)`);
        }

            const desktopInput = document.getElementById('search-input-desktop');
            currentSearchQuery = (mobileInput ? mobileInput.value : '') || (desktopInput ? desktopInput.value : '') || '';

            renderExhibitions();
        }

        function clearAllFilters() {
            currentTimeFilter = 'upcoming';
            currentSourceFilter = 'all';
            currentFeeFilter = 'all';
            currentTypeFilter = 'all';
            currentDistrictFilter = 'all';
            currentFamilyFriendlyFilter = 'all';
            currentSearchQuery = '';
            
            localStorage.setItem('schedule_time_filter', 'upcoming');
            localStorage.setItem('schedule_source_filter', 'all');
            localStorage.setItem('schedule_fee_filter', 'all');
            localStorage.setItem('schedule_type_filter', 'all');
            localStorage.setItem('schedule_district_filter', 'all');
            localStorage.setItem('schedule_family_filter', 'family');
            
            document.getElementById('search-input').value = '';
            document.getElementById('search-input-desktop').value = '';
            
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            
            document.querySelectorAll('[data-filter="upcoming"]').forEach(btn => btn.classList.add('active'));
            document.querySelectorAll('[data-type="all"]').forEach(btn => btn.classList.add('active'));
            document.querySelectorAll('[data-district="all"]').forEach(btn => btn.classList.add('active'));
            document.querySelectorAll('[data-source="all"]').forEach(btn => btn.classList.add('active'));
            document.querySelectorAll('[data-fee="all"]').forEach(btn => btn.classList.add('active'));
            document.querySelectorAll('[data-family="family"]').forEach(btn => btn.classList.add('active'));
            
            currentPage = 1;
            renderExhibitions();
        }

        function initFilters() {
            const timeButtons = document.querySelectorAll('[data-filter]');
            timeButtons.forEach(btn => {
                if (btn.dataset.filter === currentTimeFilter) {
                    btn.classList.add('active');
                }
                btn.addEventListener('click', () => {
                    timeButtons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentTimeFilter = btn.dataset.filter;
                    localStorage.setItem('schedule_time_filter', currentTimeFilter);
                    currentPage = 1;
                    renderExhibitions();
                });
            });

            const typeButtons = document.querySelectorAll('[data-type]');
            typeButtons.forEach(btn => {
                if (btn.dataset.type === currentTypeFilter) {
                    btn.classList.add('active');
                }
                btn.addEventListener('click', () => {
                    typeButtons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentTypeFilter = btn.dataset.type;
                    localStorage.setItem('schedule_type_filter', currentTypeFilter);
                    currentPage = 1;
                    renderExhibitions();
                });
            });

            const districtButtons = document.querySelectorAll('[data-district]');
            districtButtons.forEach(btn => {
                if (btn.dataset.district === currentDistrictFilter) {
                    btn.classList.add('active');
                }
                btn.addEventListener('click', () => {
                    districtButtons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentDistrictFilter = btn.dataset.district;
                    localStorage.setItem('schedule_district_filter', currentDistrictFilter);
                    currentPage = 1;
                    updateSourceButtonVisibility();
                    renderExhibitions();
                });
            });

            function updateSourceButtonVisibility() {
                const sourceButtons = document.querySelectorAll('[data-source]');
                sourceButtons.forEach(btn => {
                    const source = btn.dataset.source;
                    if (source === 'all') {
                        btn.style.display = 'block';
                    } else {
                        const district = getDistrict(source);
                        if (currentDistrictFilter === 'all' || district === currentDistrictFilter) {
                            btn.style.display = 'block';
                        } else {
                            btn.style.display = 'none';
                        }
                    }
                });
                
                if (currentDistrictFilter !== 'all' && currentSourceFilter !== 'all') {
                    const sourceDistrict = getDistrict(currentSourceFilter);
                    if (sourceDistrict !== currentDistrictFilter) {
                        currentSourceFilter = 'all';
                        localStorage.setItem('schedule_source_filter', 'all');
                        sourceButtons.forEach(b => b.classList.remove('active'));
                        sourceButtons.forEach(b => {
                            if (b.dataset.source === 'all') b.classList.add('active');
                        });
                    }
                }
            }

            const sourceButtons = document.querySelectorAll('[data-source]');
            sourceButtons.forEach(btn => {
                if (btn.dataset.source === currentSourceFilter) {
                    btn.classList.add('active');
                }
                btn.addEventListener('click', () => {
                    sourceButtons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentSourceFilter = btn.dataset.source;
                    localStorage.setItem('schedule_source_filter', currentSourceFilter);
                    currentPage = 1;
                    renderExhibitions();
                });
            });

            const feeButtons = document.querySelectorAll('[data-fee]');
            feeButtons.forEach(btn => {
                if (btn.dataset.fee === currentFeeFilter) {
                    btn.classList.add('active');
                }
                btn.addEventListener('click', () => {
                    feeButtons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFeeFilter = btn.dataset.fee;
                    localStorage.setItem('schedule_fee_filter', currentFeeFilter);
                    currentPage = 1;
                    renderExhibitions();
                });
            });

            const familyButtons = document.querySelectorAll('[data-family]');
            familyButtons.forEach(btn => {
                if (btn.dataset.family === currentFamilyFriendlyFilter) {
                    btn.classList.add('active');
                }
                btn.addEventListener('click', () => {
                    familyButtons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFamilyFriendlyFilter = btn.dataset.family;
                    localStorage.setItem('schedule_family_filter', currentFamilyFriendlyFilter);
                    currentPage = 1;
                    renderExhibitions();
                });
            });

            updateSourceButtonVisibility();
        }

        function loadExhibitions() {
            const cacheKey = 'exhibitions_cache';
            const versionKey = 'exhibitions_version';
            const lastCheckKey = 'exhibitions_last_check';
            
            const cachedData = localStorage.getItem(cacheKey);
            const cachedVersion = localStorage.getItem(versionKey);
            
            const now = Date.now();
            const lastCheck = parseInt(localStorage.getItem(lastCheckKey) || '0');
            const checkInterval = 30 * 60 * 1000;
            
            if (cachedData && cachedVersion && (now - lastCheck < checkInterval)) {
                try {
                    allExhibitions = JSON.parse(cachedData);
                    initFilters();
                    renderExhibitions();
                    console.log('使用缓存数据，版本:', cachedVersion);
                } catch (e) {
                    console.error('缓存数据解析失败:', e);
                    fetchAndCache();
                    return;
                }
            }
            
            fetchAndCache();
            
            function fetchAndCache() {
                fetch('output/exhibitions.json', { cache: 'no-cache' })
                    .then(response => {
                        const newVersion = response.headers.get('etag') || response.headers.get('last-modified') || String(Date.now());
                        response.json().then(exhibitions => {
                            if (newVersion !== cachedVersion || !cachedData) {
                                localStorage.setItem(cacheKey, JSON.stringify(exhibitions));
                                localStorage.setItem(versionKey, newVersion);
                                allExhibitions = exhibitions;
                                initFilters();
                                renderExhibitions();
                                console.log('数据已更新，版本:', newVersion);
                            } else {
                                console.log('数据未变化，跳过更新');
                            }
                            localStorage.setItem(lastCheckKey, String(Date.now()));
                        });
                    })
                    .catch(error => {
                        if (!cachedData) {
                            document.getElementById('exhibition-list').innerHTML = `
                                <div class="empty-state">
                                    <div class="icon">⚠️</div>
                                    <div>加载失败</div>
                                    <div style="font-size: 13px; margin-top: 8px; color: #bbb;">请刷新页面重试</div>
                                </div>
                            `;
                            console.error('Failed to load exhibitions:', error);
                        } else {
                            console.log('网络错误，继续使用缓存数据');
                        }
                    });
            }
        }

        window.addEventListener('DOMContentLoaded', loadExhibitions);
    </script>
