<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏛️ 场馆指南 - 童行</title>
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <style>
        :root {
            --sand-primary: #D4A373;
            --sand-light: #E8D5BC;
            --sand-dark: #B8895A;
            --sand-bg: #FDF6ED;
            --sand-50: #FFFBF5;
            --sand-100: #FDF6ED;
            --sand-200: #F5E6D3;
            --ocean: #0891B2;
            --ocean-light: #E0F2F7;
            --forest: #166534;
            --forest-light: #DCFCE7;
            --bg-warm: #FFFDF7;
            --surface: #FFFFFF;
            --text-primary: #292524;
            --text-secondary: #78716C;
            --text-muted: #A8A29E;
            --border: #F5F0E8;
            --border-strong: #E7DFD3;
            --shadow-sm: 0 1px 2px rgba(212, 163, 115, 0.05);
            --shadow-md: 0 4px 12px rgba(212, 163, 115, 0.08);
            --shadow-lg: 0 12px 24px rgba(212, 163, 115, 0.12);
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-warm);
            color: var(--text-primary);
            min-height: 100vh;
            padding-bottom: 40px;
        }
        .header {
            background: linear-gradient(135deg, var(--sand-primary) 0%, var(--sand-dark) 100%);
            color: white;
            padding: 16px 20px 24px;
            position: relative;
            box-shadow: var(--shadow-md);
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto 12px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .header h1 { font-size: 24px; max-width: 1200px; margin: 0 auto; }
        .header-sub { font-size: 13px; opacity: 0.9; max-width: 1200px; margin: 6px auto 0; }
        .btn-link {
            padding: 6px 14px;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.35);
            color: white;
            border-radius: 20px;
            font-size: 13px;
            text-decoration: none;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            transition: background 0.2s;
        }
        .btn-link:hover { background: rgba(255,255,255,0.3); }
        .filters {
            max-width: 1200px;
            margin: 20px auto 0;
            padding: 0 16px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .city-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
        .city-tab {
            padding: 7px 16px;
            border: 1.5px solid var(--border-strong);
            border-radius: 20px;
            background: var(--surface);
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        .city-tab.active {
            background: var(--sand-primary);
            color: white;
            border-color: var(--sand-primary);
        }
        .type-select, .district-select {
            padding: 7px 14px;
            border: 1.5px solid var(--border-strong);
            border-radius: 20px;
            font-size: 13px;
            background: var(--surface);
            color: var(--text-primary);
            outline: none;
            cursor: pointer;
        }
        .filter-right { margin-left: auto; display: flex; gap: 8px; flex-wrap: wrap; }
        .search-box {
            padding: 7px 14px;
            border: 1.5px solid var(--border-strong);
            border-radius: 20px;
            font-size: 13px;
            background: var(--surface);
            color: var(--text-primary);
            outline: none;
            width: 180px;
            max-width: 100%;
        }
        .search-box:focus { border-color: var(--sand-primary); }
        .stats-bar {
            max-width: 1200px;
            margin: 14px auto 0;
            padding: 0 16px;
            font-size: 13px;
            color: var(--text-muted);
        }
        .venue-grid {
            max-width: 1200px;
            margin: 14px auto 0;
            padding: 0 16px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
            gap: 16px;
        }
        .venue-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 18px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            transition: box-shadow 0.2s, transform 0.2s;
            display: flex;
            flex-direction: column;
        }
        .venue-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
        .venue-name {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
            line-height: 1.4;
        }
        .venue-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
        .tag {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 10px;
            font-weight: 500;
        }
        .tag-type { background: var(--sand-200); color: var(--sand-dark); }
        .tag-free { background: var(--forest-light); color: var(--forest); }
        .tag-paid { background: var(--sand-200); color: var(--sand-dark); }
        .tag-other { background: var(--ocean-light); color: var(--ocean); }
        .venue-info { font-size: 13px; color: var(--text-secondary); line-height: 1.7; }
        .venue-info-row { display: flex; gap: 6px; align-items: flex-start; }
        .venue-info-icon { flex-shrink: 0; }
        .venue-desc {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed var(--border);
        }
        .venue-highlights {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 10px;
        }
        .highlight-chip {
            font-size: 11px;
            padding: 2px 8px;
            background: var(--sand-100);
            border-radius: 8px;
            color: var(--sand-dark);
        }
        .venue-link {
            display: inline-flex;
            align-items: center;
            margin-top: 8px;
            padding: 8px 16px;
            font-size: 13px;
            color: white;
            background: linear-gradient(135deg, var(--ocean) 0%, #0E7490 100%);
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
            box-shadow: 0 2px 6px rgba(8, 145, 178, 0.3);
        }
        .venue-link:hover { 
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(8, 145, 178, 0.4);
        }
        .venue-links {
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px dashed var(--border);
        }
        .venue-links-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .venue-link-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
            padding: 6px 10px;
            background: var(--sand-50);
            border-radius: 8px;
            font-size: 12px;
        }
        .venue-link-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--sand-dark);
            white-space: nowrap;
            padding: 2px 6px;
            background: var(--sand-200);
            border-radius: 4px;
        }
        .venue-link-url {
            flex: 1;
            color: var(--ocean);
            text-decoration: none;
            word-break: break-all;
            font-size: 12px;
        }
        .venue-link-url:hover { text-decoration: underline; }
        .venue-detail {
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.6;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px dashed var(--border);
        }
        .venue-detail-row {
            display: flex;
            gap: 6px;
            align-items: flex-start;
        }
        .venue-detail-label {
            color: var(--text-muted);
            flex-shrink: 0;
            width: 40px;
        }

        /* 操作按钮 */
        .venue-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px dashed var(--border);
        }

        .venue-action-btn {
            flex: 1;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            transition: all 0.2s;
        }

        .venue-action-btn:hover {
            transform: translateY(-1px);
        }

        .venue-action-btn:active {
            transform: scale(0.98);
        }

        .btn-copy-name {
            background: var(--sand-100);
            color: var(--sand-dark);
            border: 1px solid var(--sand-light);
        }

        .btn-copy-addr {
            background: var(--sand-100);
            color: var(--sand-dark);
            border: 1px solid var(--sand-light);
        }

        .btn-navigate {
            background: var(--ocean-light);
            color: var(--ocean);
            border: 1px solid rgba(8, 145, 178, 0.2);
        }

        .venue-info-value {
            cursor: pointer;
        }

        .venue-info-value:hover {
            text-decoration: underline;
            color: var(--sand-dark);
        }

        .venue-copied-toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.75);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }

        .venue-copied-toast.show {
            opacity: 1;
        }
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        .loading {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        .type-section {
            grid-column: 1 / -1;
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
            margin-top: 12px;
            margin-bottom: 4px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--sand-200);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .type-count { font-size: 12px; color: var(--text-muted); font-weight: 400; }
        @media (max-width: 600px) {
            .venue-grid { grid-template-columns: 1fr; padding: 0 12px; }
            .type-select, .district-select, .search-box { width: 100%; }
            .filter-right { margin-left: 0; width: 100%; flex-direction: column; }
            .filters { padding: 0 12px; }
            .header h1 { font-size: 20px; padding: 0 12px; }
            .header-sub { padding: 0 12px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-top">
            <a href="index.html" class="btn-link">← 返回活动</a>
            <a href="https://my.feishu.cn/share/base/form/shrcnMdFfX9QxzNP72OB0j4uYDg" class="btn-link" target="_blank" rel="noopener">📝 反馈</a>
        </div>
        <h1>🏛️ 场馆指南</h1>
        <div class="header-sub">有些场馆虽暂无活动，但本身值得带娃去逛逛</div>
    </div>

    <div class="filters">
        <div class="city-tabs" id="city-tabs"><!-- 城市按钮由 output/cities.json 动态渲染 --></div>
        <div class="filter-right">
            <input type="text" class="search-box" id="search-box" placeholder="搜索场馆名称/地址...">
            <select class="district-select" id="district-filter">
                <option value="all">全部区县</option>
            </select>
            <select class="type-select" id="type-filter">
                <option value="all">全部类型</option>
            </select>
        </div>
    </div>

    <div class="stats-bar" id="stats-bar"></div>
    <div class="venue-grid" id="venue-grid">
        <div class="loading">加载中...</div>
    </div>

    <script>
        let venueList = [];
        let currentCity = 'shenzhen';
        let currentType = 'all';
        let currentDistrict = 'all';
        let currentSearch = '';

        // 从 venue_info.json 的 district 字段获取区县（数据层已注入）
        function extractDistrict(address) {
            if (!address) return '';
            const m = address.match(/([^\s市省]+?[区县])/);
            if (!m) return '';
            return m[1];
        }

        // 城市清单动态化：读取 output/cities.json 渲染城市 tab（默认选中深圳）
        async function loadCities() {
            let cities = [
                { key: 'shenzhen', name: '深圳' },
                { key: 'guangzhou', name: '广州' },
                { key: 'shanghai', name: '上海' },
                { key: 'beijing', name: '北京' },
                { key: 'hangzhou', name: '杭州' },
                { key: 'chengdu', name: '成都' },
                { key: 'chongqing', name: '重庆' },
                { key: 'nanjing', name: '南京' },
                { key: 'wuhan', name: '武汉' },
                { key: 'xian', name: '西安' }
            ];
            try {
                const resp = await fetch('output/cities.json', { cache: 'no-cache' });
                if (resp.ok) {
                    const list = await resp.json();
                    if (Array.isArray(list) && list.length) cities = list;
                }
            } catch (e) { console.warn('cities.json 加载失败，使用兜底清单', e); }
            const bar = document.getElementById('city-tabs');
            if (!bar) return;
            if (!cities.some(c => c.key === currentCity)) currentCity = cities[0].key;
            bar.innerHTML = cities.map(c =>
                `<button class="city-tab${c.key === currentCity ? ' active' : ''}" data-city="${c.key}">${c.name}</button>`
            ).join('');
        }

        async function loadData() {
            try {
                const resp = await fetch('output/venue_info.json', { cache: 'no-cache' });
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                venueList = await resp.json();
                venueList.forEach(v => { v._district = v.district || extractDistrict(v.address); });
                initTypeFilter();
                initDistrictFilter();
                render();
            } catch(e) {
                console.error('加载场馆数据失败:', e);
                document.getElementById('venue-grid').innerHTML = '<div class="empty-state">加载失败，请刷新重试</div>';
            }
        }

        function initTypeFilter() {
            const types = [...new Set(venueList.map(v => v.type).filter(Boolean))].sort();
            const sel = document.getElementById('type-filter');
            types.forEach(t => {
                const opt = document.createElement('option');
                opt.value = t; opt.textContent = t;
                sel.appendChild(opt);
            });
        }

        // 根据当前城市初始化区县筛选
        function initDistrictFilter() {
            const sel = document.getElementById('district-filter');
            sel.innerHTML = '<option value="all">全部区县</option>';
            const districts = [...new Set(
                venueList.filter(v => v.city === currentCity).map(v => v._district).filter(Boolean)
            )].sort((a, b) => a.localeCompare(b, 'zh'));
            districts.forEach(d => {
                const opt = document.createElement('option');
                opt.value = d; opt.textContent = d;
                sel.appendChild(opt);
            });
            currentDistrict = 'all';
        }

        function feeTagClass(fee) {
            if (!fee) return '';
            if (fee.indexOf('免费') >= 0) return 'tag-free';
            if (fee.indexOf('收费') >= 0) return 'tag-paid';
            return 'tag-other';
        }

        function escapeHtml(s) {
            if (!s) return '';
            return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
        }

        // 提取链接数组（向后兼容 official_url 旧格式）
        function getLinks(item) {
            if (item.links && Array.isArray(item.links) && item.links.length > 0) return item.links;
            if (item.official_url && item.official_url.trim()) return [{ url: item.official_url.trim(), label: '官方网站' }];
            return [];
        }

        function render() {
            const grid = document.getElementById('venue-grid');
            const stats = document.getElementById('stats-bar');

            let venues = venueList.filter(v => v.city === currentCity);
            if (currentDistrict !== 'all') venues = venues.filter(v => v._district === currentDistrict);
            if (currentType !== 'all') venues = venues.filter(v => v.type === currentType);
            if (currentSearch) {
                const q = currentSearch.toLowerCase();
                venues = venues.filter(v =>
                    (v.name && v.name.toLowerCase().indexOf(q) >= 0) ||
                    (v.address && v.address.toLowerCase().indexOf(q) >= 0) ||
                    (v.description && v.description.toLowerCase().indexOf(q) >= 0) ||
                    (v.highlights && v.highlights.some(h => h.toLowerCase().indexOf(q) >= 0))
                );
            }

            let statText = '共 ' + venues.length + ' 个场馆';
            if (currentDistrict !== 'all') statText += ' · ' + currentDistrict;
            if (currentType !== 'all') statText += ' · ' + currentType;
            if (currentSearch) statText += ' · 搜索"' + currentSearch + '"';
            stats.textContent = statText;

            if (venues.length === 0) {
                grid.innerHTML = '<div class="empty-state">没有符合条件的场馆，换个筛选条件试试？</div>';
                return;
            }

            // 按类型分组
            const groups = {};
            venues.forEach(v => {
                const t = v.type || '其他';
                if (!groups[t]) groups[t] = [];
                groups[t].push(v);
            });

            const typeOrder = ['博物馆', '美术馆', '图书馆', '科技馆', '公园', '演出场所', '文体中心', '文化中心', '亲子乐园', '主题乐园', '展览馆', '纪念馆', '其他'];

            let html = '';
            Object.keys(groups).sort((a, b) => {
                const ia = typeOrder.indexOf(a), ib = typeOrder.indexOf(b);
                return (ia === -1 ? 99 : ia) - (ib === -1 ? 99 : ib);
            }).forEach(type => {
                html += '<div class="type-section">📁 ' + escapeHtml(type) + ' <span class="type-count">(' + groups[type].length + ')</span></div>';
                groups[type].forEach(v => {
                    const feeTag = v.fee ? '<span class="tag ' + feeTagClass(v.fee) + '">' + escapeHtml(v.fee) + '</span>' : '';
                    let info = '';
                    if (v.address) info += '<div class="venue-info-row"><span class="venue-info-icon">📍</span><span>' + escapeHtml(v.address) + '</span></div>';
                    if (v.transport) info += '<div class="venue-info-row"><span class="venue-info-icon">🚇</span><span>' + escapeHtml(v.transport) + '</span></div>';
                    let highlights = '';
                    if (v.highlights && v.highlights.length) {
                        highlights = '<div class="venue-highlights">' + v.highlights.map(h => '<span class="highlight-chip">' + escapeHtml(h) + '</span>').join('') + '</div>';
                    }
                    let detail = '';
                    if (v.fee) detail += '<div class="venue-detail-row"><span class="venue-detail-label">门票</span><span>' + escapeHtml(v.fee) + '</span></div>';
                    let linkHtml = '';
                    var links = getLinks(v);
                    if (links.length > 0) {
                        linkHtml += '<div class="venue-links"><div class="venue-links-title">🔗 核验链接</div>';
                        links.forEach(function(l) {
                            linkHtml += '<div class="venue-link-item">' +
                                '<span class="venue-link-label">' + escapeHtml(l.label) + '</span>' +
                                '<a href="' + escapeHtml(l.url) + '" target="_blank" rel="noopener" class="venue-link-url">' + escapeHtml(l.url) + '</a>' +
                            '</div>';
                        });
                        linkHtml += '</div>';
                    }

                    const hasCoords = !!(v.latitude && v.longitude);
                    const navText = v.name + (v.address ? ' ' + v.address : '');
                    const actionsHtml = `
                        <div class="venue-actions">
                            <button class="venue-action-btn btn-copy-name" data-text="${encodeURIComponent(v.name)}">📋 复制名称</button>
                            ${(v.address && hasCoords) ? '<button class="venue-action-btn btn-copy-addr" data-text="' + encodeURIComponent(v.address) + '">📋 复制地址</button>' : ''}
                            <button class="venue-action-btn btn-navigate" data-text="${encodeURIComponent(navText)}">🗺️ 导航</button>
                        </div>
                    `;
                    html += '<div class="venue-card">' +
                        '<div class="venue-name" data-text="' + encodeURIComponent(v.name) + '" style="cursor:pointer;">' + escapeHtml(v.name) + '</div>' +
                        '<div class="venue-tags">' +
                            (v.type ? '<span class="tag tag-type">' + escapeHtml(v.type) + '</span>' : '') +
                            feeTag +
                        '</div>' +
                        '<div class="venue-info">' + info + '</div>' +
                        (v.description ? '<div class="venue-desc">' + escapeHtml(v.description) + '</div>' : '') +
                        highlights +
                        (detail ? '<div class="venue-detail">' + detail + '</div>' : '') +
                        linkHtml +
                        actionsHtml +
                    '</div>';
                });
            });

            grid.innerHTML = html;
        }

        // 事件绑定
        document.getElementById('city-tabs').addEventListener('click', function(e) {
            if (e.target.classList.contains('city-tab')) {
                document.querySelectorAll('.city-tab').forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');
                currentCity = e.target.dataset.city;
                initDistrictFilter();
                render();
            }
        });
        document.getElementById('district-filter').addEventListener('change', function(e) {
            currentDistrict = e.target.value;
            render();
        });
        document.getElementById('type-filter').addEventListener('change', function(e) {
            currentType = e.target.value;
            render();
        });
        document.getElementById('search-box').addEventListener('input', function(e) {
            currentSearch = e.target.value.trim();
            render();
        });

        // 复制功能
        function copyText(text) {
            if (!text) return;
            navigator.clipboard.writeText(text).then(function() {
                showCopiedToast();
            }).catch(function() {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showCopiedToast();
            });
        }

        function showCopiedToast() {
            const toast = document.getElementById('venue-copied-toast');
            toast.classList.add('show');
            setTimeout(function() { toast.classList.remove('show'); }, 1500);
        }

        function openMap(text) {
            const encoded = encodeURIComponent(text);
            const mapOptions = [
                { name: '微信地图', url: 'https://map.weixin.qq.com/mapsearch/mapsearch/index?query=' + encoded },
                { name: '高德地图', url: 'https://uri.amap.com/search?keyword=' + encoded },
                { name: '百度地图', url: 'https://api.map.baidu.com/search?query=' + encoded + '&output=html' },
                { name: '腾讯地图', url: 'https://map.qq.com/marker?marker=coord:,;title:' + encoded + '&zoom=16' },
                { name: 'Google Maps', url: 'https://maps.google.com/?q=' + encoded }
            ];
            
            const mapNames = mapOptions.map(m => m.name).join('|');
            const choice = prompt('选择导航地图：\n' + mapOptions.map((m, i) => (i + 1) + '. ' + m.name).join('\n'), '1');
            
            if (choice && !isNaN(choice)) {
                const index = parseInt(choice) - 1;
                if (index >= 0 && index < mapOptions.length) {
                    window.open(mapOptions[index].url, '_blank');
                }
            }
        }

        // 事件委托：处理动态生成的按钮点击
        document.getElementById('venue-grid').addEventListener('click', function(e) {
            const target = e.target;
            if (target.classList.contains('venue-action-btn')) {
                e.stopPropagation();
                if (target.classList.contains('btn-copy-name') || target.classList.contains('btn-copy-addr')) {
                    copyText(decodeURIComponent(target.dataset.text));
                } else if (target.classList.contains('btn-navigate')) {
                    openMap(decodeURIComponent(target.dataset.text));
                }
            } else {
                const btn = target.closest('.venue-action-btn');
                if (btn) {
                    e.stopPropagation();
                    if (btn.classList.contains('btn-copy-name') || btn.classList.contains('btn-copy-addr')) {
                        copyText(decodeURIComponent(btn.dataset.text));
                    } else if (btn.classList.contains('btn-navigate')) {
                        openMap(decodeURIComponent(btn.dataset.text));
                    }
                }
            }
        });

        // 点击场馆名称复制
        document.getElementById('venue-grid').addEventListener('click', function(e) {
            const venueName = e.target.closest('.venue-name');
            if (venueName && !e.target.classList.contains('venue-action-btn')) {
                copyText(decodeURIComponent(venueName.dataset.text));
            }
        });

        loadCities().then(loadData);
    </script>
    <div class="venue-copied-toast" id="venue-copied-toast">已复制</div>
</body>
</html>
